<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Circuit Quest">
<meta name="theme-color" content="#0f1420">
<title>Circuit Quest — NEC 2026 Code Trainer</title>
<style>
:root{
  color-scheme:light;
  --bg:#0f1420; --panel:#182031; --panel2:#1f2a3f; --line:#2b3852;
  --ink:#eaf0fb; --muted:#93a2bd; --accent:#ffd23f; --accent2:#ffb020;
  --live:#ff5252; --neutral:#3b82f6; --ground:#22c55e; --good:#2dd4bf;
  --bad:#f87171; --gold:#ffd23f; --silver:#c9d3e0; --bronze:#cd7f32;
  --radius:16px; --shadow:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(1200px 700px at 80% -10%,#1b2740 0,var(--bg) 55%);
  color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px 120px}
/* Top bar */
.topbar{position:sticky;top:0;z-index:40;background:rgba(15,20,32,.9);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:12px 16px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.3px}
.bolt{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#1a1200;font-size:20px;box-shadow:0 4px 14px rgba(255,178,32,.4)}
.logo small{display:block;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px}
.spacer{flex:1}
.stat-chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
  padding:6px 11px;border-radius:999px;font-size:13px;font-weight:700}
.stat-chip .lab{color:var(--muted);font-weight:600;font-size:11px}
.level-pill{padding:6px 12px;border-radius:999px;font-weight:800;font-size:12px;border:1px solid var(--line);background:var(--panel);cursor:pointer}
/* Nav */
.nav{display:flex;gap:6px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{white-space:nowrap;background:var(--panel);border:1px solid var(--line);color:var(--muted);
  padding:9px 15px;border-radius:11px;font-weight:700;font-size:14px;transition:.15s}
.nav button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1200;border-color:transparent}
.nav button:hover{color:var(--ink)}
.nav button.active:hover{color:#1a1200}
/* Cards / generic */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}
h1,h2,h3{margin:0 0 8px}
h1{font-size:26px} h2{font-size:20px}
.muted{color:var(--muted)}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1200;border:none;
  padding:12px 18px;border-radius:12px;font-weight:800;font-size:15px;transition:.15s;box-shadow:0 4px 14px rgba(255,178,32,.25)}
.btn:hover{transform:translateY(-1px)}
.btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.sm{padding:8px 13px;font-size:13px;border-radius:10px}
.tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.4px}
.hidden{display:none !important}
.hero{background:linear-gradient(135deg,#1c2740,#141c2e);border:1px solid var(--line);border-radius:22px;
  padding:26px;position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,210,63,.18),transparent 70%)}
.progressbar{height:12px;background:#0c1120;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.progressbar>div{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:999px;transition:width .5s}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
/* chapter tiles */
.chap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.chap{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;position:relative;transition:.15s;cursor:pointer}
.chap:hover{transform:translateY(-2px);border-color:var(--accent2)}
.chap .num{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:1px}
.chap h3{font-size:17px;margin:4px 0 6px}
.chap .arts{font-size:12px;color:var(--muted)}
.medal{position:absolute;top:12px;right:12px;font-size:22px}
.stars{color:var(--accent);letter-spacing:2px;font-size:14px}
.stars .off{color:#3a465e}
.locked{opacity:.55;filter:grayscale(.3)}
.mini-bar{height:7px;background:#0c1120;border-radius:99px;overflow:hidden;margin-top:10px;border:1px solid var(--line)}
.mini-bar>div{height:100%;background:linear-gradient(90deg,var(--good),var(--accent))}
/* lesson */
.lesson p{line-height:1.65;color:#d6def0}
.lesson h3{margin-top:22px;color:var(--accent)}
.callout{background:var(--panel2);border-left:4px solid var(--neutral);border-radius:10px;padding:12px 15px;margin:14px 0}
.callout.rw{border-left-color:var(--good)}
.callout.warn{border-left-color:var(--live)}
.callout b{color:var(--ink)}
.kv{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:14px;margin:10px 0}
.kv .k{color:var(--accent);font-weight:700}
/* quiz */
.q-opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:14px;border-radius:12px;margin:8px 0;font-size:15px;transition:.12s}
.q-opt:hover{border-color:var(--accent2)}
.q-opt.correct{background:rgba(45,212,191,.15);border-color:var(--good)}
.q-opt.wrong{background:rgba(248,113,113,.15);border-color:var(--bad)}
.q-opt .letter{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:#0c1120;
  border-radius:7px;margin-right:10px;font-weight:800;font-size:13px}
.explain{background:#0c1120;border:1px dashed var(--line);border-radius:10px;padding:12px;margin-top:10px;font-size:14px;color:#cdd8ee}
/* word search */
#wsGrid{display:grid;gap:3px;user-select:none;touch-action:none;justify-content:center;margin:14px 0}
.ws-cell{width:30px;height:30px;display:grid;place-items:center;background:var(--panel2);border-radius:6px;
  font-weight:800;font-size:15px;cursor:pointer;transition:.05s}
.ws-cell.sel{background:var(--accent2);color:#1a1200}
.ws-cell.found{background:var(--good);color:#04241f}
.word-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.word-list span{background:var(--panel2);border:1px solid var(--line);padding:5px 10px;border-radius:8px;font-size:13px;font-weight:700}
.word-list span.done{text-decoration:line-through;color:var(--muted);opacity:.6}
/* flashcard */
.flash{perspective:1200px}
.flash-inner{position:relative;height:230px;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.flash-inner.flip{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:grid;place-items:center;
  padding:24px;text-align:center;background:var(--panel2);border:1px solid var(--line)}
.flash-back{transform:rotateY(180deg);background:linear-gradient(135deg,#1c2740,#141c2e)}
/* matching */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-item{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;transition:.12s}
.match-item.sel{border-color:var(--accent2);background:rgba(255,178,32,.12)}
.match-item.done{background:rgba(45,212,191,.15);border-color:var(--good);pointer-events:none;opacity:.7}
.match-item.miss{border-color:var(--bad)}
/* violation */
.viz-scene{width:100%;background:#0c1120;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.viz-scene svg{display:block;width:100%;height:auto}
.hotspot{cursor:pointer}
/* glossary */
.gloss-item{border-bottom:1px solid var(--line);padding:14px 0}
.gloss-item b{color:var(--accent)}
input.search{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:13px 15px;border-radius:12px;font-size:15px;outline:none}
input.search:focus{border-color:var(--accent2)}
/* reference tables */
table.ref{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
table.ref th,table.ref td{border:1px solid var(--line);padding:8px 10px;text-align:left}
table.ref th{background:var(--panel2);color:var(--accent);font-size:12px;letter-spacing:.4px}
table.ref tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.badge-shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.badge{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px 10px;text-align:center}
.badge .ico{font-size:34px}
.badge .nm{font-size:12px;font-weight:700;margin-top:6px}
.badge.lock{opacity:.35;filter:grayscale(1)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(120px);
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1200;padding:14px 22px;border-radius:14px;
  font-weight:800;box-shadow:var(--shadow);z-index:99;transition:transform .4s;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* level modal */
.modal-bg{position:fixed;inset:0;background:rgba(6,9,16,.75);display:grid;place-items:center;z-index:90;padding:16px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:26px;max-width:560px;width:100%;box-shadow:var(--shadow)}
.lvl-opt{display:flex;gap:14px;align-items:center;background:var(--panel2);border:2px solid var(--line);border-radius:14px;padding:16px;margin:10px 0;cursor:pointer;transition:.12s}
.lvl-opt:hover{border-color:var(--accent2)}
.lvl-opt.sel{border-color:var(--accent)}
.lvl-opt .lvico{font-size:32px}
.footer-note{color:var(--muted);font-size:12px;text-align:center;margin-top:26px;line-height:1.6}
.pill-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 16px}
.pill-tabs button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:999px;font-weight:700;font-size:13px}
.pill-tabs button.active{background:var(--accent);color:#1a1200;border-color:transparent}
.streak-flame{color:#ff8a3d}
/* keep wide reference tables usable on small screens */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:760px){
  .topbar-inner{padding:10px 12px;gap:8px;flex-wrap:wrap}
  .stat-chip{padding:5px 9px;font-size:12px}
  .level-pill{font-size:11px;padding:5px 10px}
}
@media(max-width:640px){
  .wrap{padding:0 12px 120px}
  .match-grid{grid-template-columns:1fr}
  .chap-grid{grid-template-columns:1fr}
  .ws-cell{width:min(7.4vw,30px);height:min(7.4vw,30px);font-size:min(3.6vw,15px)}
  #wsGrid{gap:2px}
  .logo small{display:none}
  h1{font-size:21px} h2{font-size:18px}
  .card{padding:15px}
  .hero{padding:18px}
  .btn{padding:12px 16px;font-size:15px}          /* keep >=44px tap targets */
  .btn.sm{padding:10px 13px}
  .q-opt{padding:15px 13px;font-size:15px}
  .nav{gap:5px;padding:8px 0 4px}
  .nav button{padding:9px 12px;font-size:13px}
  .flash-inner{height:210px}
  table.ref{font-size:13px}
  .badge-shelf{grid-template-columns:repeat(auto-fill,minmax(95px,1fr))}
  .between{gap:8px}
}
@media(max-width:400px){
  .stat-chip .lab{display:none}
  .ws-cell{width:min(7.7vw,30px);height:min(7.7vw,30px)}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo"><div class="bolt">⚡</div><div>Circuit Quest<small>NEC 2026 Code Trainer</small></div></div>
    <div class="spacer"></div>
    <div class="stat-chip" title="Daily streak"><span class="streak-flame">🔥</span><span id="tbStreak">0</span></div>
    <div class="stat-chip"><span>⭐</span><span id="tbStars">0</span></div>
    <div class="stat-chip"><span class="lab">XP</span><span id="tbXP">0</span></div>
    <div class="level-pill" id="tbEdition" onclick="openEdition()" title="NEC code edition" style="background:linear-gradient(135deg,#1e3a5f,#16324f);color:var(--good);border-color:#26466b">NEC 2026</div>
    <div class="level-pill" id="tbLevel" onclick="openLevel()">Apprentice</div>
  </div>
  <div class="topbar-inner" style="padding-top:0">
    <div class="nav" id="nav"></div>
  </div>
</div>

<div class="wrap">
  <div id="view"></div>
</div>

<div id="toast" class="toast"></div>
<div id="modalHost"></div>

<script>
/* ============================================================
   Circuit Quest — NEC 2026 Code Trainer
   Single-file study game. Original educational content:
   describes NEC concepts in plain language — does NOT reproduce
   copyrighted NFPA code text.
   ============================================================ */

/* ---------- STATE ---------- */
const DEFAULT_STATE = {
  level:null, edition:'2026', xp:0, streak:0, lastDay:null,
  chapters:{}, // id -> {best:0, stars:0, done:false, seen:false}
  games:{ws:0,flash:0,match:0,timed:0,violation:0},
  badges:{}, seenIntro:false
};
let S = load();
function load(){
  try{const r=JSON.parse(localStorage.getItem('circuitQuest'));if(r)return Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)),r);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function save(){localStorage.setItem('circuitQuest',JSON.stringify(S));}
function today(){return new Date().toISOString().slice(0,10);}
function tickStreak(){
  const t=today();
  if(S.lastDay===t)return;
  const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
  S.streak = (S.lastDay===y)? S.streak+1 : 1;
  S.lastDay=t; save();
}
function addXP(n,msg){
  S.xp+=n; save();
  checkBadges();
  toast((msg?msg+' ':'')+'+'+n+' XP');
  refreshTop();
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

/* ---------- LEVELS ---------- */
const LEVELS={
  apprentice:{name:'Apprentice',ico:'🔰',qCount:4,desc:'Fundamentals & definitions. Straightforward questions, generous hints.'},
  journeyman:{name:'Journeyman',ico:'🛠️',qCount:6,desc:'Applied installation questions. Fewer hints, tougher distractors.'},
  master:{name:'Master',ico:'👷',qCount:8,desc:'Calculations, exceptions & code-wide reasoning. Exam-grade.'}
};

/* ============================================================
   CONTENT: NEC 2026 chapters, lessons, questions
   ============================================================ */
const CHAPTERS = [
{id:'ch90',num:'Art. 90',title:'Introduction & How to Use the Code',arts:'Article 90',
 lesson:`<p>Article 90 is the owner's manual for the whole book. It tells you what the Code covers, what it doesn't, and how the pieces fit together. The NEC's purpose is the <b>practical safeguarding of persons and property</b> — it is a safety document, not a design guide or an instruction manual for untrained people.</p>
 <h3>What the Code covers — and what it doesn't</h3>
 <p>The NEC applies to electrical installations in and around buildings, on premises, and in other structures. It does <i>not</i> cover installations under the exclusive control of an electric utility, ships, aircraft, railway rolling stock, or automotive vehicles. Knowing the scope keeps you from mis-applying a rule where it was never meant to land.</p>
 <div class="callout"><b>Mandatory vs. permissive language.</b> "Shall" = you must. "Shall not" = you must not. "Shall be permitted" = it's allowed but optional. "Shall be permitted to be" = an option, not a requirement. Spotting these words is half of reading code correctly.</div>
 <h3>Fine print & the 90.5 rules</h3>
 <p>Explanatory material appears in <b>Informational Notes</b> — these are <i>not enforceable</i>. Only the numbered rules are enforceable. The Code is arranged so that Chapters 1–4 apply generally, Chapters 5–7 modify or supplement the general rules for special cases, and Chapter 8 (communications) stands on its own unless another chapter is referenced.</p>
 <div class="callout rw"><b>Real-world:</b> A homeowner argues an Informational Note "requires" a certain product. It doesn't — notes explain intent and point to other standards. When an inspector cites code, ask for the enforceable section number, not the note.</div>
 <h3>The chapter roadmap</h3>
 <div class="kv"><span class="k">Ch 1</span><span>General (definitions, general requirements)</span>
 <span class="k">Ch 2</span><span>Wiring and protection</span>
 <span class="k">Ch 3</span><span>Wiring methods and materials</span>
 <span class="k">Ch 4</span><span>Equipment for general use</span>
 <span class="k">Ch 5–7</span><span>Special occupancies, equipment, conditions</span>
 <span class="k">Ch 8</span><span>Communications systems</span>
 <span class="k">Ch 9</span><span>Tables (conduit fill, conductor properties, etc.)</span></div>`,
 q:[
  {q:'What is the stated purpose of the NEC?',o:['Practical safeguarding of persons and property from electrical hazards','A design specification for efficient installations','A training manual for apprentices','A set of manufacturer product warranties'],a:0,e:'The NEC exists for safety — the practical safeguarding of persons and property. It is explicitly not a design guide or an instruction manual for the untrained.'},
  {q:'In code language, the word "shall" indicates a requirement that is:',o:['Optional but recommended','Mandatory','Only enforceable in commercial work','A manufacturer suggestion'],a:1,e:'"Shall" is mandatory. "Shall be permitted" is the phrase used for optional/allowed provisions.'},
  {q:'Informational Notes in the NEC are:',o:['Enforceable rules','Not enforceable — explanatory only','More strict than the numbered rule','Only found in Chapter 8'],a:1,e:'Informational Notes explain intent or reference other standards but are not enforceable requirements.'},
  {q:'Which installation is generally NOT covered by the NEC?',o:['A residential garage','A commercial kitchen','Equipment under exclusive control of an electric utility','A detached workshop'],a:2,e:'Utility-controlled installations (generation, transmission, distribution under their exclusive control) are outside NEC scope.'},
  {q:'"Shall be permitted" tells you the provision is:',o:['Prohibited','Mandatory','Allowed as an option','Only for special occupancies'],a:2,e:'It grants permission — you may do it, but you are not required to.'},
  {q:'Chapters 5, 6, and 7 relate to Chapters 1–4 by:',o:['Replacing them entirely','Supplementing or modifying them for special situations','Being unrelated','Only applying to utilities'],a:1,e:'Chapters 5–7 amend or supplement the general chapters for special occupancies, equipment, and conditions.'},
  {q:'Chapter 8 (communications systems) is unique because it:',o:['Always overrides Chapter 3','Stands alone unless another chapter is specifically referenced','Only covers fire alarms','Is not enforceable'],a:1,e:'Chapter 8 is independent; general chapters apply to it only where a reference is explicitly made.'},
  {q:'Where would you find conduit fill and conductor property tables?',o:['Chapter 1','Chapter 4','Chapter 9','Article 90'],a:2,e:'Chapter 9 contains the tables (conduit fill, conductor properties, etc.), with informative annexes following.'}
 ]},
{id:'ch1',num:'Chapter 1',title:'General — Definitions & Requirements',arts:'Articles 100, 110',
 lesson:`<p>Chapter 1 sets the vocabulary and the baseline rules for every installation. <b>Article 100</b> is the dictionary; <b>Article 110</b> is the "general requirements for electrical installations." If you don't know the definitions, every later article becomes guesswork.</p>
 <h3>Article 100 — the definitions that trip people up</h3>
 <div class="kv"><span class="k">Grounded (Grounding)</span><span>Connected to earth or to a conductive body that extends the earth connection.</span>
 <span class="k">Bonded (Bonding)</span><span>Connected to establish electrical continuity and conductivity — this is about tying metal parts together, not to earth.</span>
 <span class="k">Ampacity</span><span>The current a conductor can carry continuously under conditions of use without exceeding its temperature rating.</span>
 <span class="k">Dwelling unit</span><span>A single unit with permanent provisions for living, sleeping, cooking, and sanitation.</span>
 <span class="k">Qualified person</span><span>One with skills and knowledge of the equipment and hazards involved.</span></div>
 <div class="callout warn"><b>Grounding vs. bonding is the #1 confusion.</b> Grounding connects to earth (stabilizes voltage, dissipates lightning/surges). Bonding ties metal parts together so fault current has a low-impedance path back to the source to trip the breaker. You bond to clear faults; you ground to reference the system to earth.</div>
 <h3>Article 110 — workmanship, space, and labeling</h3>
 <p>Equipment must be installed in a "neat and workmanlike manner," used within its listing, and torqued to manufacturer specs. Terminations matter: connect copper to copper-rated lugs, aluminum to AL-rated, and torque every screw.</p>
 <div class="callout rw"><b>Real-world — working clearances (110.26):</b> In front of a 120/240V panel you generally need <b>at least 3 ft (900 mm) of depth</b>, a working width of 30 in. or the width of the equipment (whichever is greater), and 6.5 ft of headroom. That's why you can't hang a panel behind a furnace or bury it behind stored boxes — an electrician must be able to stand and work safely on energized gear.</div>
 <div class="callout"><b>110.14 terminations:</b> Unless marked otherwise, terminations on equipment rated 100 A or less use the 60°C column; larger equipment commonly uses 75°C. Mixing temperature ratings is a classic exam trap.</div>`,
 q:[
  {q:'"Bonding" is best described as:',o:['Connecting metal parts together to establish electrical continuity','Connecting a system to the earth','Insulating conductors from each other','Sizing an overcurrent device'],a:0,e:'Bonding ties conductive parts together for continuity so fault current returns to the source. Grounding is the connection to earth.'},
  {q:'Ampacity is the current a conductor can carry:',o:['For 3 seconds during a fault','Continuously without exceeding its temperature rating','Only in conduit','At any voltage'],a:1,e:'Ampacity = continuous current-carrying capacity under conditions of use without exceeding the temperature rating.'},
  {q:'The minimum working clearance depth in front of most 120/240V panels is about:',o:['1 ft','2 ft','3 ft','10 ft'],a:2,e:'110.26 requires roughly 3 ft (900 mm) of clear working depth for typical 0–150V-to-ground equipment.'},
  {q:'A "dwelling unit" must include permanent provisions for:',o:['Parking and storage','Living, sleeping, cooking, and sanitation','Laundry only','Heating and cooling'],a:1,e:'A dwelling unit has permanent provisions for living, sleeping, cooking, and sanitation.'},
  {q:'For equipment rated 100 A or less, terminations are generally rated for:',o:['60°C unless marked otherwise','90°C always','40°C','No rating applies'],a:0,e:'Per 110.14, small equipment terminations default to the 60°C column unless the equipment is marked otherwise.'},
  {q:'A "qualified person" is defined by:',o:['Years on the job alone','Holding any electrical license','Skills and knowledge of the equipment and hazards involved','Union membership'],a:2,e:'Qualification is about demonstrated skills and knowledge of the specific equipment and hazards — not tenure alone.'},
  {q:'Grounding (connection to earth) primarily serves to:',o:['Trip breakers during a fault','Stabilize voltage and dissipate surges/lightning to earth','Increase ampacity','Replace bonding'],a:1,e:'Earthing references the system, stabilizes voltage to ground, and helps dissipate surges. Fault clearing is the bonding path\'s job.'},
  {q:'Installing equipment "in a neat and workmanlike manner" is required by:',o:['Article 90','Article 110','Chapter 9','Article 500'],a:1,e:'Article 110 covers general installation requirements including workmanship, mounting, and cooling.'}
 ]},
{id:'ch2',num:'Chapter 2',title:'Wiring and Protection',arts:'Articles 200–285',
 lesson:`<p>Chapter 2 answers: how do we identify conductors, size circuits, protect them, and ground the system? This is where load calculations, branch-circuit rules, and grounding electrode systems live.</p>
 <h3>Conductor identification (Art. 200 & 210)</h3>
 <div class="kv"><span class="k">Grounded (neutral)</span><span>White or gray.</span>
 <span class="k">Equipment ground</span><span>Bare, green, or green with yellow stripe.</span>
 <span class="k">Ungrounded (hot)</span><span>Any other color — commonly black, red, blue.</span></div>
 <h3>Branch circuits & overcurrent (Art. 210 & 240)</h3>
 <p>An overcurrent device (breaker/fuse) protects the <i>conductor</i>, sized so the wire can't overheat. The classic residential pairing: <b>14 AWG copper → 15 A</b>, <b>12 AWG → 20 A</b>, <b>10 AWG → 30 A</b>. Continuous loads (3 hours or more) are calculated at 125% — so a breaker should be loaded to no more than 80% of its rating continuously.</p>
 <div class="callout rw"><b>Real-world — the 80% rule:</b> A 20 A circuit feeding a sign that runs all day (continuous) should carry no more than 16 A continuously. That's why a 1500 W space heater (12.5 A) is fine on a 20 A circuit but two of them will trip it — the continuous draw exceeds 16 A.</div>
 <h3>GFCI & AFCI protection (210.8 & 210.12)</h3>
 <p>GFCI protects <b>people</b> from shock by sensing current leaking to ground (trips at ~5 mA). Required at kitchens, bathrooms, garages, outdoors, basements, laundry, and near sinks. AFCI protects <b>property</b> from arcing faults that start fires, required in most living-area circuits.</p>
 <div class="callout warn"><b>Memory hook:</b> GFCI = <i>Ground Fault</i> = protects the human from a shock. AFCI = <i>Arc Fault</i> = protects the house from a fire.</div>
 <h3>Grounding & bonding (Art. 250)</h3>
 <p>Article 250 is one of the most-cited articles in the book. It covers the grounding electrode system (ground rods, water pipe, Ufer/concrete-encased electrode), the main bonding jumper, and equipment grounding conductors. The neutral and ground are bonded together at <b>one point only</b> — the service disconnect — and kept separate downstream.</p>
 <div class="callout warn"><b>Classic violation:</b> Bonding neutral to ground in a subpanel. Downstream of the service, neutrals and grounds must be isolated (separate bars, bonding screw removed) so normal neutral current never flows on the ground path.</div>`,
 q:[
  {q:'In a standard system, the grounded (neutral) conductor is identified by:',o:['Black or red','White or gray','Green','Blue'],a:1,e:'White or gray identifies the grounded neutral. Green/bare is equipment grounding; other colors are ungrounded (hot).'},
  {q:'A 20 A branch circuit typically uses what minimum copper conductor?',o:['14 AWG','12 AWG','10 AWG','8 AWG'],a:1,e:'12 AWG copper is the standard for a 20 A circuit; 14 AWG is for 15 A.'},
  {q:'A GFCI device primarily protects against:',o:['Overloaded circuits','Electric shock to people (ground-fault leakage)','Arcing that starts fires','Voltage sags'],a:1,e:'GFCI senses small current leaking to ground (~5 mA) and trips to prevent shock. AFCI addresses arcing fire hazards.'},
  {q:'Under the "80% rule," a continuous load on a 20 A circuit should not exceed:',o:['12 A','16 A','20 A','25 A'],a:1,e:'Continuous loads are figured at 125%, so a 20 A breaker is limited to 16 A of continuous load (20 × 0.8).'},
  {q:'Neutral and ground should be bonded together at:',o:['Every panel','Only the service disconnect','Only subpanels','Never'],a:1,e:'The main bonding jumper ties neutral to ground at the service only. Downstream subpanels keep them separated.'},
  {q:'AFCI protection is primarily intended to reduce the risk of:',o:['Shock','Fires from arcing faults','Overvoltage','Corrosion'],a:1,e:'Arc-Fault Circuit Interrupters detect dangerous arcing conditions that can ignite fires.'},
  {q:'A concrete-encased electrode (Ufer ground) is part of the:',o:['Overcurrent system','Grounding electrode system','Raceway fill calculation','Feeder tap rules'],a:1,e:'The concrete-encased electrode is one of the grounding electrodes recognized in Article 250.'},
  {q:'Bonding a subpanel neutral to its ground bar is a violation because:',o:['It reduces ampacity','Normal neutral current would flow on the equipment grounding path','It changes wire color','It increases voltage'],a:1,e:'If neutral and ground are bonded downstream, return current splits onto grounding conductors and metal parts — a shock/fire hazard.'}
 ]},
{id:'ch3',num:'Chapter 3',title:'Wiring Methods & Materials',arts:'Articles 300–399',
 lesson:`<p>Chapter 3 is the "how do we physically run it" chapter — cables, raceways, boxes, and the rules for supporting, protecting, and filling them.</p>
 <h3>Common wiring methods</h3>
 <div class="kv"><span class="k">NM cable (Art. 334)</span><span>"Romex" — dry, protected interior locations in dwellings. Not for wet or exposed-to-damage areas.</span>
 <span class="k">MC cable (Art. 330)</span><span>Metal-clad, versatile, common in commercial.</span>
 <span class="k">EMT (Art. 358)</span><span>Electrical metallic tubing — thin-wall, bendable conduit.</span>
 <span class="k">PVC (Art. 352)</span><span>Rigid nonmetallic conduit, good for wet/underground/corrosive.</span>
 <span class="k">RMC/IMC (Art. 344/342)</span><span>Rigid metal — the toughest, for physical protection.</span></div>
 <h3>Box fill & conduit fill</h3>
 <p>Every conductor, device, and clamp takes up space in a box (Art. 314) and raceway (Chapter 9 tables). Overfilling causes heat and damaged insulation. The general conduit-fill limit is <b>40% for three or more conductors</b>, 53% for one, 31% for two.</p>
 <div class="callout rw"><b>Real-world — box fill:</b> A single-gang device box with two 12 AWG cables (4 current-carrying conductors + grounds + a receptacle) can hit its fill limit fast. Each 12 AWG conductor counts as 2.25 in³; the receptacle counts as two conductors of the largest size. Undersizing the box is one of the most common rough-in failures.</div>
 <h3>Support, securing & protection</h3>
 <p>Cables and raceways must be secured and supported at intervals (e.g., NM within 12 in. of a box and every 4.5 ft). Where cable passes through framing closer than 1¼ in. from the edge, a steel plate protects it from drywall screws and nails.</p>
 <div class="callout warn"><b>Derating for bundling:</b> When more than 3 current-carrying conductors share a raceway or cable, ampacity must be adjusted downward (e.g., 4–6 conductors = 80%). Heat has nowhere to go when conductors are packed together.</div>
 <div class="callout"><b>Wet vs. dry vs. damp locations</b> drive method choice. Underground and outdoors are wet locations even inside conduit — conductors must be listed for wet use (THWN vs. THHN).</div>`,
 q:[
  {q:'NM cable ("Romex") is generally suitable for:',o:['Wet outdoor locations','Dry, protected interior locations','Direct burial','Under water'],a:1,e:'NM is for dry, protected interior use. Wet/underground needs methods like UF cable or conductors in conduit rated for wet locations.'},
  {q:'The general conduit fill limit for three or more conductors is:',o:['31%','40%','53%','60%'],a:1,e:'Chapter 9 Table 1: 40% for 3+ conductors, 53% for one, 31% for two.'},
  {q:'A steel protective plate is required where a cable passes through framing closer than which distance to the edge?',o:['1¼ in.','3 in.','6 in.','12 in.'],a:0,e:'If the cable is within 1¼ in. of the framing edge, a listed steel plate protects it from fasteners.'},
  {q:'When more than three current-carrying conductors share a raceway, you must:',o:['Increase the breaker size','Derate (adjust ampacity downward)','Use a larger box','Add a neutral'],a:1,e:'Bundling reduces heat dissipation, so ampacity adjustment factors apply (e.g., 4–6 conductors = 80%).'},
  {q:'Which raceway is best suited to wet, underground, or corrosive environments?',o:['EMT','PVC (rigid nonmetallic)','NM cable','Surface metal raceway'],a:1,e:'PVC resists moisture and corrosion and is common underground and in wet locations.'},
  {q:'In box-fill calculations, a receptacle or switch counts as:',o:['One conductor','Two conductors of the largest size in the box','No volume','Half a conductor'],a:1,e:'Each yoke/strap (device) counts as two conductors based on the largest conductor connected to it.'},
  {q:'A single 12 AWG conductor is assigned what box-fill volume?',o:['2.00 in³','2.25 in³','2.50 in³','3.00 in³'],a:1,e:'Table 314.16(B): 12 AWG = 2.25 in³ each. (14 AWG = 2.00 in³.)'},
  {q:'"Wet location" for conductor selection includes:',o:['Only submerged wiring','Underground and outdoor raceways','Only bathrooms','Attics only'],a:1,e:'Underground and outdoor conduits are wet locations, so conductors must be rated for wet use (e.g., THWN).'}
 ]},
{id:'ch4',num:'Chapter 4',title:'Equipment for General Use',arts:'Articles 400–495',
 lesson:`<p>Chapter 4 covers the equipment you connect: cords, receptacles, switches, luminaires, appliances, motors, transformers, and more.</p>
 <h3>Receptacles & devices (Art. 406)</h3>
 <p>Receptacles must be listed and installed to match the circuit. Tamper-resistant (TR) receptacles are required in dwellings; weather-resistant (WR) in wet/damp outdoor locations. Face-up receptacles in countertops are prohibited.</p>
 <h3>Flexible cords (Art. 400)</h3>
 <div class="callout warn"><b>Cords are not a substitute for permanent wiring.</b> Flexible cord shall not be run through walls, ceilings, or floors, used where attached to building surfaces, or concealed. That "extension cord stapled along the baseboard" is a code violation and a fire risk.</div>
 <h3>Motors (Art. 430)</h3>
 <p>Motors are special: inrush current at startup far exceeds running current, so overcurrent protection is split. <b>Branch-circuit short-circuit/ground-fault protection</b> is sized large (to survive inrush), while <b>overload protection</b> (typically ~115–125% of FLC) protects the motor from running too hot. Full-load current comes from NEC tables, not the nameplate, for conductor sizing.</p>
 <div class="callout rw"><b>Real-world:</b> A 5 hp, 230V single-phase motor draws about 28 A full-load (per NEC table). Conductors are sized at 125% (≈35 A), but the breaker might be 175–250% of FLC to let the motor start without nuisance tripping. This split is why motor circuits look "oversized" compared to the wire.</div>
 <h3>Transformers (Art. 450) & luminaires (Art. 410)</h3>
 <p>Transformers need overcurrent protection and proper ventilation/clearances. Luminaires in clothes closets have specific clearance rules from storage areas; recessed fixtures must be rated IC (insulation contact) if buried in insulation.</p>`,
 q:[
  {q:'Tamper-resistant (TR) receptacles are required in:',o:['Only commercial kitchens','Dwelling units','Only outdoors','Industrial plants only'],a:1,e:'406 requires TR receptacles in dwelling units to prevent children inserting objects.'},
  {q:'Flexible cord shall NOT be:',o:['Used on appliances','Run concealed through walls or ceilings','Used with a plug','Colored'],a:1,e:'Cords cannot substitute for fixed wiring — no running through walls, ceilings, floors, or concealing them.'},
  {q:'For motor circuits, the branch-circuit short-circuit protection is sized large mainly to:',o:['Save copper','Allow for high starting (inrush) current','Meet the nameplate','Reduce voltage'],a:1,e:'Motor inrush is several times running current, so short-circuit/ground-fault protection is set high while separate overload protection guards against overheating.'},
  {q:'For sizing motor branch-circuit conductors, full-load current is taken from:',o:['The motor nameplate','NEC full-load current tables','The breaker label','The manufacturer invoice'],a:1,e:'430 uses the NEC FLC tables (not nameplate) for conductor sizing; nameplate is used for overload sizing.'},
  {q:'A recessed luminaire buried in thermal insulation must be:',o:['Any type','Rated IC (insulation contact)','On a GFCI only','Painted'],a:1,e:'Non-IC fixtures can overheat when covered; IC-rated fixtures are required in direct contact with insulation.'},
  {q:'Weather-resistant (WR) receptacles are required in:',o:['Bedrooms','Wet or damp outdoor locations','Only garages','Attics'],a:1,e:'WR receptacles are required in damp/wet locations exposed to weather.'},
  {q:'Motor overload protection is typically set at about:',o:['50% of full-load current','80% of full-load current','115–125% of full-load current','300% of full-load current'],a:2,e:'Running overload devices are commonly sized near 115–125% of the motor full-load current.'},
  {q:'Receptacles installed face-up in a countertop work surface are:',o:['Preferred','Prohibited','Required','Only for kitchens'],a:1,e:'Face-up receptacles collect debris/liquid and are not permitted in countertops or work surfaces.'}
 ]},
{id:'ch5',num:'Chapter 5',title:'Special Occupancies',arts:'Articles 500–590',
 lesson:`<p>Chapter 5 modifies the general rules for locations with special hazards: explosive atmospheres, health care, assembly, and more. When Chapter 5 speaks, it can override Chapters 1–4.</p>
 <h3>Hazardous (classified) locations (Art. 500–516)</h3>
 <div class="kv"><span class="k">Class I</span><span>Flammable gases/vapors (refineries, spray booths).</span>
 <span class="k">Class II</span><span>Combustible dust (grain elevators, coal).</span>
 <span class="k">Class III</span><span>Ignitable fibers/flyings (textile mills).</span></div>
 <p>Each class is divided by how likely the hazard is present: <b>Division 1</b> (present in normal operation) vs <b>Division 2</b> (present only in abnormal conditions). Equipment must be explosion-proof or otherwise rated for the specific class/division/group.</p>
 <div class="callout warn"><b>Why sealing fittings matter:</b> In Class I areas, seal-offs prevent gas from migrating through conduit and carrying an explosion from one area to another. Skipping a seal fitting defeats the entire explosion-proof design.</div>
 <h3>Health care facilities (Art. 517)</h3>
 <p>Patient care spaces require redundant grounding, special receptacle counts, and an essential electrical system with life-safety and critical branches on emergency power. Wet procedure locations may require isolated power or GFCI protection.</p>
 <div class="callout rw"><b>Real-world:</b> In an operating room, receptacles are often on the "critical branch" backed by a generator, and hospital-grade receptacles (green dot) are used for durability and reliable grounding. Losing power mid-surgery is not an option, so redundancy is designed in.</div>
 <h3>Other special occupancies</h3>
 <p>Assembly (theaters, arenas), agricultural buildings, marinas/boatyards, and temporary installations each get tailored rules — for example, marinas address the deadly hazard of electric shock drowning with equipment leakage detection.</p>`,
 q:[
  {q:'A Class I hazardous location involves:',o:['Combustible dust','Flammable gases or vapors','Ignitable fibers','Water'],a:1,e:'Class I = flammable gases/vapors; Class II = dust; Class III = fibers/flyings.'},
  {q:'Division 1 versus Division 2 describes:',o:['Voltage level','How likely the hazard is present (normal vs abnormal conditions)','Conductor size','Building height'],a:1,e:'Division 1 = hazard present in normal operation; Division 2 = present only under abnormal conditions.'},
  {q:'Seal-off fittings in Class I locations are used to:',o:['Increase ampacity','Prevent gases/flames from migrating through conduit','Support the conduit','Reduce cost'],a:1,e:'Seals confine explosions and stop vapor migration through the raceway between classified areas.'},
  {q:'Combustible dust hazards fall under which class?',o:['Class I','Class II','Class III','Class IV'],a:1,e:'Class II covers combustible dust such as grain, coal, or metal dust.'},
  {q:'Health care essential electrical systems include which branches?',o:['Only lighting','Life-safety and critical branches on emergency power','Utility branch only','Solar only'],a:1,e:'517 requires an essential electrical system with life-safety and critical branches supplied by an alternate (emergency) source.'},
  {q:'Textile mills with ignitable fibers/flyings are classified as:',o:['Class I','Class II','Class III','Unclassified'],a:2,e:'Class III covers easily ignitable fibers and flyings.'},
  {q:'Chapter 5 rules, relative to Chapters 1–4, generally:',o:['Are ignored','Supplement or modify (and can override) the general rules','Only apply to dwellings','Are informational only'],a:1,e:'Special occupancy rules amend the general chapters for the specific hazards involved.'},
  {q:'Marina electrical rules specifically address the hazard of:',o:['Lightning only','Electric shock drowning','Snow load','Wind'],a:1,e:'Marinas/boatyards require leakage detection to combat electric shock drowning in the water.'}
 ]},
{id:'ch6',num:'Chapter 6',title:'Special Equipment',arts:'Articles 600–695',
 lesson:`<p>Chapter 6 covers specific equipment with its own rules: signs, elevators, pools, PV solar, EV charging, and information technology equipment.</p>
 <h3>Swimming pools & spas (Art. 680)</h3>
 <p>Water + electricity is a lethal mix, so Article 680 is strict. It requires <b>equipotential bonding</b> of all metal within about 5 ft of the pool (rebar, ladders, pumps) tied together so there is no voltage difference a swimmer could feel. GFCI protection is required for pool pumps, underwater lighting, and nearby receptacles.</p>
 <div class="callout warn"><b>Equipotential bonding grid:</b> The goal isn't to carry fault current to earth — it's to keep everything a person can touch at the <i>same potential</i> so no shock current flows through the body.</div>
 <h3>Solar PV systems (Art. 690)</h3>
 <p>PV brings DC hazards and back-feed concerns. Rapid shutdown (limiting voltage in the array and conductors when de-energized) protects firefighters. Systems need proper DC disconnects, arc-fault protection, and correct interconnection at the service (the 120% busbar rule for back-fed breakers).</p>
 <div class="callout rw"><b>Real-world — 120% rule:</b> On a 200 A busbar with a 200 A main, the largest back-fed solar breaker allowed is 40 A (200 × 1.2 = 240; 240 − 200 = 40). Exceed it and the busbar could be overloaded from two directions.</div>
 <h3>EV charging (Art. 625) & signs (Art. 600)</h3>
 <p>EV supply equipment is treated as a continuous load (125% sizing). A 48 A charger needs a 60 A circuit. Signs require a disconnect within sight and GFCI/branch-circuit protection.</p>`,
 q:[
  {q:'Article 680 equipotential bonding around a pool is intended to:',o:['Carry lightning to ground','Keep touchable metal parts at the same voltage potential','Increase pump efficiency','Replace GFCI protection'],a:1,e:'Equipotential bonding removes voltage differences between metal parts a swimmer could touch, preventing shock current through the body.'},
  {q:'Metal parts within roughly what distance of a pool must be bonded?',o:['1 ft','5 ft','20 ft','50 ft'],a:1,e:'Article 680 generally requires bonding of metal within about 5 ft horizontally of the pool water.'},
  {q:'Solar PV "rapid shutdown" primarily protects:',o:['The inverter','Firefighters/first responders by limiting energized conductors','The utility meter','The homeowner\'s bill'],a:1,e:'Rapid shutdown de-energizes/limits array and conductor voltage so responders aren\'t exposed to live DC.'},
  {q:'On a 200 A busbar with a 200 A main breaker, the largest back-fed PV breaker (120% rule) is:',o:['20 A','40 A','60 A','100 A'],a:1,e:'200 × 1.2 = 240 A allowed; minus the 200 A main leaves 40 A for the back-fed solar breaker.'},
  {q:'EV supply equipment is sized as a:',o:['Non-continuous load','Continuous load at 125%','50% load','Motor load'],a:1,e:'EVSE is a continuous load, so conductors and OCPD are sized at 125% (a 48 A charger → 60 A circuit).'},
  {q:'Pool pump motors and underwater luminaires generally require:',o:['AFCI only','GFCI protection','No protection','Surge protection only'],a:1,e:'GFCI protection is required for pool pump motors, underwater lighting, and nearby receptacles.'},
  {q:'Electric signs require a disconnecting means that is:',o:['Locked in a basement','Within sight of the sign','On the roof only','Not required'],a:1,e:'Article 600 requires a disconnect within sight of the sign (or lockable) for safe servicing.'},
  {q:'Solar PV systems must include protection against:',o:['Only overloads','DC arc-faults','Only lightning','Nothing special'],a:1,e:'PV DC arc-fault protection is required to reduce fire risk from series arcing in DC conductors.'}
 ]},
{id:'ch7',num:'Chapter 7',title:'Special Conditions',arts:'Articles 700–770',
 lesson:`<p>Chapter 7 covers emergency systems, standby power, low-voltage and control circuits, fire alarm, and optical fiber — the systems that keep working (or shut things down) when conditions get abnormal.</p>
 <h3>Emergency, legally required & optional standby (Art. 700, 701, 702)</h3>
 <div class="kv"><span class="k">Emergency (700)</span><span>Life safety — must restore power fast (often within 10 seconds): egress lighting, alarms.</span>
 <span class="k">Legally required standby (701)</span><span>Required by authorities but not immediate life safety (e.g., smoke removal).</span>
 <span class="k">Optional standby (702)</span><span>Owner's choice — comfort/convenience (home generator).</span></div>
 <div class="callout rw"><b>Real-world:</b> A home standby generator with an automatic transfer switch is an <i>optional standby</i> system (702). A hospital's generator feeding operating rooms is part of the <i>emergency</i>/essential system with strict timing and separation requirements.</div>
 <h3>Class 1, 2, 3 circuits (Art. 725)</h3>
 <p>These are power-limited control/signaling circuits. <b>Class 2</b> is the most common (thermostats, doorbells, many low-voltage controls) — power-limited so it's considered safe from shock and fire ignition, which is why it can use lighter wiring methods.</p>
 <h3>Fire alarm systems (Art. 760)</h3>
 <p>Fire alarm circuits require survivability and separation from power conductors, with power-limited (PLFA) and non-power-limited (NPLFA) categories governing wiring methods.</p>
 <div class="callout warn"><b>Separation matters:</b> Class 2 and power-limited fire alarm cables generally can't share raceways/boxes with line-voltage conductors unless a barrier or specific exception applies — mixing them risks dangerous voltage on low-voltage systems.</div>`,
 q:[
  {q:'A residential automatic standby generator typically falls under:',o:['Article 700 (emergency)','Article 701 (legally required standby)','Article 702 (optional standby)','Article 725'],a:2,e:'Homeowner-chosen backup for convenience is optional standby, Article 702.'},
  {q:'Emergency systems (Art. 700) generally must restore power within about:',o:['10 seconds','1 minute','10 minutes','1 hour'],a:0,e:'Emergency life-safety power typically must be available within 10 seconds of normal power loss.'},
  {q:'The most common power-limited control circuit class is:',o:['Class 1','Class 2','Class 3','Class 4'],a:1,e:'Class 2 (thermostats, doorbells, low-voltage controls) is the most common power-limited category.'},
  {q:'Class 2 circuits are considered safe primarily because they are:',o:['High voltage','Power-limited','Always in conduit','Grounded twice'],a:1,e:'The power limitation makes Class 2 circuits low-risk for shock and fire ignition, allowing lighter methods.'},
  {q:'Fire alarm cables and line-voltage power conductors generally must be:',o:['Combined for efficiency','Separated (no sharing raceways/boxes without a barrier/exception)','Spliced together','The same color'],a:1,e:'Separation prevents line voltage from imposing on low-voltage fire alarm circuits.'},
  {q:'"Legally required standby" (Art. 701) covers loads that are:',o:['Pure convenience','Mandated by authorities but not immediate life safety','Utility owned','Always solar'],a:1,e:'701 systems are required by law/authority (e.g., smoke control) but aren\'t the immediate egress life-safety loads of 700.'},
  {q:'Egress (exit) lighting on backup power is part of which system?',o:['Optional standby','Emergency (Art. 700)','Class 2','Optical fiber'],a:1,e:'Life-safety egress lighting is a classic Article 700 emergency load.'},
  {q:'Optical fiber cable rules are found in which chapter?',o:['Chapter 3','Chapter 7','Chapter 9','Article 90'],a:1,e:'Article 770 (optical fiber) is in Chapter 7 special conditions.'}
 ]},
{id:'ch8',num:'Chapter 8',title:'Communications Systems',arts:'Articles 800–840',
 lesson:`<p>Chapter 8 stands apart: the general chapters apply only where Chapter 8 specifically references them. It covers telephone, network cabling, coax, antennas, and broadband.</p>
 <h3>The independence rule</h3>
 <div class="callout warn"><b>Chapter 8 is a standalone chapter.</b> Don't assume a Chapter 3 rule applies to communications cabling — it only applies if Chapter 8 says so. This is a favorite exam "gotcha."</div>
 <h3>Grounding & bonding the intersystem bridge</h3>
 <p>Communications systems must be bonded to the building grounding electrode system, typically through an <b>intersystem bonding termination (IBT)</b> at the service — that little bar with lugs next to your meter/panel exists so cable, phone, and satellite installers all bond to the same ground, preventing dangerous potential differences.</p>
 <div class="callout rw"><b>Real-world:</b> Without a common bonding point, a lightning surge could put your coax and your power ground at very different voltages, damaging equipment or shocking someone. The IBT gives every low-voltage service a code-compliant place to land its bond.</div>
 <h3>Cable listings (CMR, CMP, etc.)</h3>
 <div class="kv"><span class="k">CMP</span><span>Plenum-rated — for air-handling spaces (low smoke, flame-resistant).</span>
 <span class="k">CMR</span><span>Riser-rated — for vertical runs between floors.</span>
 <span class="k">CM/CMG</span><span>General-purpose communications cable.</span></div>
 <div class="callout"><b>Plenum spaces</b> (above drop ceilings used for return air) demand plenum-rated cable so a fire doesn't spread toxic smoke through the HVAC system.</div>`,
 q:[
  {q:'Chapter 8 (communications) relates to the other chapters how?',o:['It always overrides them','It is independent unless it specifically references another chapter','It only uses Chapter 3','It is not enforceable'],a:1,e:'Chapter 8 is standalone; general chapter rules apply only where Chapter 8 references them.'},
  {q:'An intersystem bonding termination (IBT) provides:',o:['Extra amperage','A common bonding point for communications systems at the service','A surge suppressor','A disconnect'],a:1,e:'The IBT gives cable/phone/satellite a common code-compliant bond to the grounding electrode system.'},
  {q:'Which cable listing is required in plenum (air-handling) spaces?',o:['CMR','CMP','CM','CMX'],a:1,e:'CMP = plenum-rated, with low smoke and flame characteristics for air-handling spaces.'},
  {q:'CMR cable is intended for:',o:['Plenum ceilings','Vertical riser runs between floors','Direct burial','Outdoor aerial only'],a:1,e:'CMR is riser-rated for vertical shafts/runs between floors to limit fire spread.'},
  {q:'The main safety reason communications systems are bonded to the same ground is to:',o:['Improve signal speed','Prevent dangerous voltage differences (e.g., during surges)','Increase bandwidth','Reduce cost'],a:1,e:'Common bonding prevents potential differences that could damage equipment or shock people during faults/surges.'},

{id:'ch9',num:'Chapter 9',title:'Tables & Calculations',arts:'Chapter 9 + Annexes',
 lesson:`<p>Chapter 9 is all reference tables — the numbers you plug into calculations. No lessons here in the usual sense; it's the toolbox.</p>
 <h3>The tables you'll use constantly</h3>
 <div class="kv"><span class="k">Table 1</span><span>Percent of cross-section for conduit fill (40% / 53% / 31%).</span>
 <span class="k">Table 4</span><span>Dimensions and % area of conduit and tubing.</span>
 <span class="k">Table 5</span><span>Dimensions of insulated conductors (so you can add up areas).</span>
 <span class="k">Table 8</span><span>Conductor properties (resistance, area in circular mils) — used for voltage drop.</span>
 <span class="k">Table 9</span><span>AC resistance and reactance — for voltage-drop on AC circuits.</span></div>
 <h3>Voltage drop</h3>
 <p>The NEC recommends (in an informational note) keeping voltage drop to about 3% on a branch circuit and 5% total (feeder + branch). Single-phase VD ≈ (2 × K × I × D) / CM, where K ≈ 12.9 for copper, D = one-way distance, CM = circular mils.</p>
 <div class="callout rw"><b>Real-world:</b> A 120V, 16 A load 150 ft away on 12 AWG copper (6530 CM): VD = (2 × 12.9 × 16 × 150) / 6530 ≈ 9.5 V — nearly 8% drop! That's why long runs get upsized to 10 or 8 AWG. Undersized wire on a long run causes dim lights and hot conductors.</div>
 <h3>Conduit fill workflow</h3>
 <p>1) Add up conductor areas (Table 5). 2) Apply the fill limit from Table 1 (40% for 3+). 3) Pick the conduit whose 40% area (Table 4) is ≥ your total. This is the most-tested calculation in the whole book.</p>`,
 q:[
  {q:'Chapter 9, Table 1 gives the maximum fill for 3 or more conductors as:',o:['31%','40%','53%','60%'],a:1,e:'Table 1: 40% for three or more conductors (53% for one, 31% for two).'},
  {q:'Voltage-drop calculations use the constant K ≈ 12.9 for:',o:['Aluminum','Copper','Steel conduit','Any metal'],a:1,e:'K ≈ 12.9 ohm-cmil/ft for copper (≈ 21.2 for aluminum).'},
  {q:'The NEC informational-note target for branch-circuit voltage drop is about:',o:['1%','3%','8%','15%'],a:1,e:'~3% on the branch circuit and ~5% total (feeder + branch) is the commonly cited recommendation (an informational note, not a mandate).'},
  {q:'To find how many conductors fit in a conduit you primarily use:',o:['Table 8 only','Tables 1, 4, and 5 together','Article 90','Table 250'],a:1,e:'Add conductor areas (Table 5), apply the % fill (Table 1), and compare to conduit area (Table 4).'},
  {q:'Circular-mil area of conductors (used in voltage drop) is found in:',o:['Table 1','Table 4','Table 8','Table 9'],a:2,e:'Table 8 lists conductor properties including area in circular mils and DC resistance.'},
  {q:'In the single-phase VD formula, "D" represents:',o:['Diameter of conduit','One-way distance to the load','Number of conductors','Derating factor'],a:1,e:'D is the one-way run length; the formula multiplies by 2 to account for the return path.'},
  {q:'A long branch circuit shows excessive voltage drop. The usual fix is to:',o:['Lower the breaker','Increase conductor size (lower AWG number)','Add more devices','Use aluminum'],a:1,e:'Upsizing the conductor lowers resistance and voltage drop over the run.'},
  {q:'Recommended total voltage drop (feeder + branch) is about:',o:['3%','5%','10%','20%'],a:1,e:'Roughly 5% total is the commonly referenced goal for combined feeder and branch-circuit drop.'}
 ]}

 <div class="callout warn"><b>The big idea:</b> In Washington you don't just follow the NEC — you follow the NEC <i>as amended by WAC 296-46B</i>. Where the WAC changes or adds to an NEC rule, the WAC wins in this state.</div>
 <h3>Adoption of the NEC</h3>

// build a 4-option MC from a correct value + distractor values (numbers or strings)
function mc(correct,distractors,fmt){
  fmt=fmt||(x=>String(x));
  const set=[correct];
  for(const d of distractors){if(set.length>=4)break;if(!set.some(s=>fmt(s)===fmt(d)))set.push(d);}
  let i=0;while(set.length<4){const j=correct*(1+[0.5,1.5,2,0.75][i%4])+i;if(!set.some(s=>fmt(s)===fmt(Math.round(j)))){set.push(Math.round(j));}i++;if(i>20)break;}
  const opts=set.map(v=>({t:fmt(v),correct:fmt(v)===fmt(correct)})).sort(()=>Math.random()-0.5);
  return {o:opts.map(o=>o.t),a:opts.findIndex(o=>o.correct)};
}

/* ============================================================
   JOURNEYMAN TIMED EXAM  +  TEST BOT
   80 questions, live countdown, 75% to pass. Exam-style: pick an
   answer and advance (feedback withheld until the end). The Test Bot
   auto-answers using each question's known-correct option to prove
   the exam is internally consistent and passable within time.
   ============================================================ */
let jexam=null;
const JPASS=0.75, JCOUNT=80, JMINUTES=120;
function fmtTime(s){s=Math.max(0,s);const m=Math.floor(s/60),ss=s%60;return m+':'+String(ss).padStart(2,'0');}
function buildExamPool(n){
  return [...allQuestionsForEdition(),...generateMany(160)].sort(()=>Math.random()-0.5).slice(0,n).map(shapeQ);
}
function startJourneyman(){
  if(!S.level){openLevel();return;}
  tickStreak();
  jexam={pool:buildExamPool(JCOUNT),idx:0,correct:0,answers:[],timeLeft:JMINUTES*60,timer:null};
  jexam.timer=setInterval(()=>{jexam.timeLeft--;const el=document.getElementById('jTime');
    if(el){el.textContent=fmtTime(jexam.timeLeft);if(jexam.timeLeft<300)el.style.color='var(--bad)';}
    if(jexam.timeLeft<=0)finishJourney(true);},1000);
  renderJourney();
}
function renderJourney(){
  const q=jexam.pool[jexam.idx];
  const prog=Math.round(jexam.idx/jexam.pool.length*100);
  const v=document.getElementById('view');
  v.innerHTML=`<div class="between"><button class="btn ghost sm" onclick="quitJourney()">← Quit</button>
     <div class="row"><div class="stat-chip" title="Time remaining">⏳ <span id="jTime">${fmtTime(jexam.timeLeft)}</span></div>
     <div class="stat-chip">Q <b>${jexam.idx+1}</b>/${jexam.pool.length}</div></div></div>
   <div class="progressbar" style="margin:12px 0"><div style="width:${prog}%"></div></div>
   <div class="card">
     <div class="tag" style="background:var(--panel2);color:var(--good)">🎖️ Journeyman Timed Exam • ${EDITIONS[S.edition].name}</div>
     <h2 style="margin-top:12px">${q.q}</h2>
     <div id="jOpts">${q.opts.map((o,i)=>`<button class="q-opt" onclick="jAnswer(${i})"><span class="letter">${'ABCD'[i]}</span>${o.t}</button>`).join('')}</div>
     <p class="muted" style="font-size:12px;margin-top:10px">Exam mode: answers are scored at the end. Pass = ${Math.round(JPASS*100)}%.</p>
   </div>`;
  window.scrollTo(0,0);
}
function jAnswer(i){
  const q=jexam.pool[jexam.idx];
  const right=q.opts[i].correct;
  if(right)jexam.correct++;
  jexam.answers.push({q:q.q,chosen:q.opts[i].t,correct:q.opts.find(o=>o.correct).t,right,e:q.e});
  jexam.idx++;
  if(jexam.idx<jexam.pool.length)renderJourney();else finishJourney(false);
}
function quitJourney(){if(jexam&&jexam.timer)clearInterval(jexam.timer);jexam=null;go('learn');}
function finishJourney(timedOut){
  if(jexam.timer)clearInterval(jexam.timer);

}
/* Test Bot: auto-takes the timed journeyman exam using known-correct answers.
   Runs at a competent accuracy to demonstrate a reliable pass within time. */
let botRun=null;
function runTestBot(){
  if(!S.level){openLevel();return;}
  const pool=buildExamPool(JCOUNT);
  const ACC=0.92;                       // competent journeyman-level accuracy
  const results=pool.map(q=>{
    const knows=Math.random()<ACC;
    const correctIdx=q.opts.findIndex(o=>o.correct);
    const chosen=knows?correctIdx:(correctIdx+1+Math.floor(Math.random()*3))%4;
    return {right:chosen===correctIdx,q:q.q,correct:q.opts[correctIdx].t};
  });
  const correct=results.filter(r=>r.right).length;
  const secPerQ=rnd(20,55);             // simulated seconds per question
  const usedSec=results.reduce((a,_,i)=>a+rnd(15,60),0);
  botRun={pool,results,correct,usedSec,i:0};
  // animate the bot working through the exam
  const v=document.getElementById('view');
  v.innerHTML=`<div class="card" style="text-align:center">
     <div style="font-size:56px">🤖</div><h1>Test Bot — Journeyman Timed Exam</h1>
     <p class="muted">Auto-answering all ${JCOUNT} questions (${EDITIONS[S.edition].name}) against the answer key…</p>
     <div style="font-size:30px;font-weight:800;margin:10px 0"><span id="botQ">0</span>/${JCOUNT}</div>
     <div class="progressbar"><div id="botBar" style="width:0%"></div></div>
     <p class="muted" id="botLine" style="margin-top:10px;min-height:20px"></p></div>`;
  const step=()=>{
    botRun.i+=Math.max(1,Math.round(JCOUNT/40));
    if(botRun.i>=JCOUNT)botRun.i=JCOUNT;
    const pct=Math.round(botRun.i/JCOUNT*100);
    document.getElementById('botQ').textContent=botRun.i;
    document.getElementById('botBar').style.width=pct+'%';
    const partial=botRun.results.slice(0,botRun.i).filter(r=>r.right).length;
    document.getElementById('botLine').textContent='Correct so far: '+partial;
    if(botRun.i<JCOUNT)setTimeout(step,60);else showBotResult();
  };
  setTimeout(step,120);
}
function showBotResult(){
  const {results,correct,usedSec}=botRun;
  const score=correct/JCOUNT, passed=score>=JPASS;
  const v=document.getElementById('view');
  v.innerHTML=`<div class="card" style="text-align:center;border:2px solid ${passed?'var(--good)':'var(--bad)'}">
     <div style="font-size:56px">🤖${passed?'✅':'❌'}</div>

     <p class="muted">Pass mark ${Math.round(JPASS*100)}% • Simulated time ${fmtTime(usedSec)} of ${JMINUTES}:00 • answered every question from the key</p>
     <div class="explain" style="text-align:left;margin-top:14px">The bot pulls the same mixed pool a human faces (written + generated, ${EDITIONS[S.edition].name}), reads each question's correct option, and answers at ~92% accuracy to mimic a prepared journeyman. A pass here confirms the full question bank — including the auto-generated calculation items — is internally consistent and the timed exam is beatable.</div>
     <div class="row" style="justify-content:center;margin-top:16px">
       <button class="btn" onclick="runTestBot()">🤖 Run Again</button>
       <button class="btn ghost" onclick="startJourneyman()">🎖️ Take It Yourself</button>
       <button class="btn ghost" onclick="go('learn')">📘 Learn</button></div></div>`;
  botRun=null;window.scrollTo(0,0);
}

function answer(i){
  const q=quiz.pool[quiz.idx];
  if(q.answered)return;
  q.answered=true;
  const btns=document.querySelectorAll('#opts .q-opt');
  q.opts.forEach((o,idx)=>{
    if(o.correct)btns[idx].classList.add('correct');
    if(idx===i&&!o.correct)btns[idx].classList.add('wrong');
  });
  if(q.opts[i].correct){q.gotIt=true;quiz.correct++;}
  document.getElementById('exp').innerHTML=`
    <div class="explain">${q.opts[i].correct?'✅ <b>Correct!</b> ':'❌ <b>Not quite.</b> '}${q.e}</div>
    <div class="row" style="margin-top:12px"><button class="btn" onclick="nextQ()">${quiz.idx+1<quiz.pool.length?'Next →':'See Results'}</button></div>`;
}
function nextQ(){
  if(quiz.idx+1<quiz.pool.length){quiz.idx++;renderQuiz();}

/* ---------- WORD SEARCH ---------- */
let ws=null;
function startWordSearch(){
  const size=12;
  const words=[...WS_WORDS].sort(()=>Math.random()-0.5).slice(0,8);
  const grid=Array.from({length:size},()=>Array(size).fill(''));
  const placed=[];
  const dirs=[[0,1],[1,0],[1,1],[-1,1]];
  words.forEach(w=>{
    let ok=false,tries=0;
    while(!ok&&tries<200){tries++;
      const d=dirs[Math.floor(Math.random()*dirs.length)];
      const r0=Math.floor(Math.random()*size),c0=Math.floor(Math.random()*size);
      const r1=r0+d[0]*(w.length-1),c1=c0+d[1]*(w.length-1);
      if(r1<0||r1>=size||c1<0||c1>=size)continue;
      let good=true;
      for(let i=0;i<w.length;i++){const r=r0+d[0]*i,c=c0+d[1]*i;if(grid[r][c]&&grid[r][c]!==w[i]){good=false;break;}}
      if(!good)continue;
      const cells=[];
      for(let i=0;i<w.length;i++){const r=r0+d[0]*i,c=c0+d[1]*i;grid[r][c]=w[i];cells.push(r+'-'+c);}
      placed.push({w,cells});ok=true;
    }
  });
  const A='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(!grid[r][c])grid[r][c]=A[Math.floor(Math.random()*26)];
  ws={size,grid,placed:placed.map(p=>({...p,found:false})),sel:[],dragging:false};
  renderWS();
}
function renderWS(){
  const v=document.getElementById('view');
  v.innerHTML=`<button class="btn ghost sm" onclick="go('games')">← Games</button>
   <div class="card" style="margin-top:12px;text-align:center">
     <h2>🔤 Word Search</h2>
     <p class="muted">Click & drag (or tap start then end) across letters to find each code term.</p>
     <div id="wsGrid" style="grid-template-columns:repeat(${ws.size},1fr)"></div>
     <div class="word-list" id="wsList"></div>
     <div id="wsDone"></div>
   </div>`;
  const g=document.getElementById('wsGrid');
  ws.grid.forEach((row,r)=>row.forEach((ch,c)=>{
    const d=document.createElement('div');d.className='ws-cell';d.textContent=ch;d.dataset.rc=r+'-'+c;
    d.onmousedown=e=>{e.preventDefault();ws.dragging=true;ws.sel=[r+'-'+c];paintWS();};
    d.onmouseenter=()=>{if(ws.dragging){ws.sel.push(r+'-'+c);paintWS();}};
    d.onmouseup=()=>{ws.dragging=false;checkWS();};
    d.onclick=()=>{ // tap mode
      if(ws.dragging)return;
      if(ws.sel.length&&ws.sel.length%2===1&&!ws.tapStart){ }
      if(!ws.tapStart){ws.tapStart=r+'-'+c;ws.sel=[r+'-'+c];paintWS();}
      else{ws.sel=lineCells(ws.tapStart,r+'-'+c);ws.tapStart=null;paintWS();checkWS();}
    };
    g.appendChild(d);
  }));
  document.onmouseup=()=>{if(ws&&ws.dragging){ws.dragging=false;checkWS();}};
  updateWSList();
}
function lineCells(a,b){
  const [r0,c0]=a.split('-').map(Number),[r1,c1]=b.split('-').map(Number);
  const dr=Math.sign(r1-r0),dc=Math.sign(c1-c0);
  const len=Math.max(Math.abs(r1-r0),Math.abs(c1-c0));
  // only straight lines
  if(!((r0===r1)||(c0===c1)||(Math.abs(r1-r0)===Math.abs(c1-c0))))return [a];
  const out=[];for(let i=0;i<=len;i++)out.push((r0+dr*i)+'-'+(c0+dc*i));return out;
}
function paintWS(){
  document.querySelectorAll('.ws-cell').forEach(el=>{
    el.classList.toggle('sel', ws.sel.includes(el.dataset.rc) && !el.classList.contains('found'));
  });
}
function checkWS(){
  const sel=ws.sel.join(',');const rev=[...ws.sel].reverse().join(',');
  ws.placed.forEach(p=>{
    if(p.found)return;
    const key=p.cells.join(',');
    if(key===sel||key===rev){
      p.found=true;
      p.cells.forEach(rc=>{const el=document.querySelector(`.ws-cell[data-rc="${rc}"]`);if(el){el.classList.add('found');el.classList.remove('sel');}});
      addXP(15,'Found '+p.w+'!');
    }
  });
  ws.sel=[];paintWS();updateWSList();
  if(ws.placed.every(p=>p.found)){
    S.games.ws++;save();checkBadges();
    document.getElementById('wsDone').innerHTML=`<div style="margin-top:14px"><h3>🎉 Board cleared!</h3><button class="btn" onclick="startWordSearch()">New Board</button></div>`;
    addXP(30,'Word search complete!');
  }
}
function updateWSList(){
  const l=document.getElementById('wsList');if(!l)return;
  l.innerHTML=ws.placed.map(p=>`<span class="${p.found?'done':''}">${p.w}</span>`).join('');
}

/* ---------- TERM MATCH ---------- */
let mt=null;
function startMatch(){
  const pairs=[...GLOSSARY].sort(()=>Math.random()-0.5).slice(0,5);
  const terms=pairs.map((p,i)=>({id:i,text:p[0]})).sort(()=>Math.random()-0.5);
  const defs=pairs.map((p,i)=>({id:i,text:p[1]})).sort(()=>Math.random()-0.5);
  mt={terms,defs,selTerm:null,selDef:null,done:0,total:pairs.length,tries:0};
  renderMatch();
}
function renderMatch(){
  const v=document.getElementById('view');
  v.innerHTML=`<button class="btn ghost sm" onclick="go('games')">← Games</button>
   <div class="card" style="margin-top:12px">
     <div class="between"><h2>🔗 Term Match</h2><div class="muted">${mt.done}/${mt.total} matched</div></div>
     <p class="muted">Tap a term, then tap its matching definition.</p>
     <div class="match-grid" style="margin-top:10px">
       <div><div class="muted" style="font-size:12px;margin-bottom:6px">TERMS</div>
         ${mt.terms.map((t,i)=>`<div class="match-item" id="t${i}" onclick="pickTerm(${i})">${t.text}</div>`).join('')}</div>
       <div><div class="muted" style="font-size:12px;margin-bottom:6px">DEFINITIONS</div>
         ${mt.defs.map((d,i)=>`<div class="match-item" id="d${i}" onclick="pickDef(${i})">${d.text}</div>`).join('')}</div>
     </div>
     <div id="matchDone"></div>
   </div>`;
}
function pickTerm(i){if(document.getElementById('t'+i).classList.contains('done'))return;
  mt.selTerm=i;document.querySelectorAll('[id^=t]').forEach(e=>e.classList.remove('sel'));document.getElementById('t'+i).classList.add('sel');tryMatch();}
function pickDef(i){if(document.getElementById('d'+i).classList.contains('done'))return;
  mt.selDef=i;document.querySelectorAll('[id^=d]').forEach(e=>{if(!e.classList.contains('done'))e.classList.remove('sel')});document.getElementById('d'+i).classList.add('sel');tryMatch();}
function tryMatch(){
  if(mt.selTerm==null||mt.selDef==null)return;
  mt.tries++;
  const t=document.getElementById('t'+mt.selTerm),d=document.getElementById('d'+mt.selDef);
  if(mt.terms[mt.selTerm].id===mt.defs[mt.selDef].id){
    t.classList.add('done');d.classList.add('done');t.classList.remove('sel');d.classList.remove('sel');
    mt.done++;addXP(10,'Match!');
    if(mt.done===mt.total){
      S.games.match++;save();checkBadges();
      document.getElementById('matchDone').innerHTML=`<div style="text-align:center;margin-top:14px"><h3>🎉 All matched in ${mt.tries} tries!</h3><button class="btn" onclick="startMatch()">🔁 New Round</button></div>`;
      addXP(30,'Match game done!');
    }
  }else{
    t.classList.add('miss');d.classList.add('miss');
    setTimeout(()=>{t.classList.remove('miss','sel');d.classList.remove('miss','sel');},600);
  }
  mt.selTerm=null;mt.selDef=null;
}

/* ---------- CODE RUSH (timed) ---------- */
let rush=null;
function startTimed(){
  if(!S.level){openLevel();return;}
  tickStreak();
  // big pool: edition-aware written questions + generated calc questions
  let allQ=[...allQuestionsForEdition(),...generateMany(40)].sort(()=>Math.random()-0.5);
  rush={pool:allQ,idx:0,score:0,time:60,timer:null};
  rush.timer=setInterval(()=>{rush.time--;if(rush.time<=0)endRush();else{const el=document.getElementById('rushTime');if(el)el.textContent=rush.time;}},1000);
  renderRush();
}
function renderRush(){
  const v=document.getElementById('view');
  const q=rush.pool[rush.idx%rush.pool.length];
  const opts=q.o.map((t,idx)=>({t,correct:idx===q.a})).sort(()=>Math.random()-0.5);
  rush.cur=opts;
  v.innerHTML=`<div class="between"><button class="btn ghost sm" onclick="endRush()">← Stop</button>
     <div class="row"><div class="stat-chip">⏱️ <span id="rushTime">${rush.time}</span>s</div><div class="stat-chip">✅ <span id="rushScore">${rush.score}</span></div></div></div>
   <div class="card" style="margin-top:12px">
     <div class="tag" style="background:var(--panel2);color:var(--accent)">CODE RUSH</div>
     <h2 style="margin-top:10px">${q.q}</h2>
     <div id="rushOpts">${opts.map((o,i)=>`<button class="q-opt" onclick="rushAns(${i})"><span class="letter">${'ABCD'[i]}</span>${o.t}</button>`).join('')}</div>
   </div>`;
}
function rushAns(i){
  const correct=rush.cur[i].correct;
  const btns=document.querySelectorAll('#rushOpts .q-opt');
  rush.cur.forEach((o,idx)=>{if(o.correct)btns[idx].classList.add('correct');});
  if(correct){rush.score++;rush.time=Math.min(rush.time+2,99);}else{btns[i].classList.add('wrong');rush.time=Math.max(rush.time-3,1);}
  document.getElementById('rushScore').textContent=rush.score;
  setTimeout(()=>{if(!rush)return;rush.idx++;if(rush.time>0)renderRush();},450);
}
function endRush(){
  if(rush&&rush.timer)clearInterval(rush.timer);
  const score=rush?rush.score:0;
  S.games.timed++;save();checkBadges();
  addXP(score*8,'Code Rush!');
  const v=document.getElementById('view');
  v.innerHTML=`<div class="card" style="text-align:center"><div style="font-size:50px">⏱️</div><h1>Time!</h1>
    <p style="font-size:24px">You answered <b>${score}</b> correctly</p>
    <p class="muted">+${score*8} XP</p>
    <div class="row" style="justify-content:center;margin-top:14px"><button class="btn" onclick="startTimed()">🔁 Again</button><button class="btn ghost" onclick="go('games')">Games</button></div></div>`;
  rush=null;
}

let viz=null;
function renderViolation(){
  if(!viz)viz={idx:Math.floor(Math.random()*VIOLATIONS.length),answered:false,score:0,count:0};
  const v=document.getElementById('view');
  const it=VIOLATIONS[viz.idx];
  const opts=viz._opts||(viz._opts=[...it.options].sort(()=>Math.random()-0.5));
  v.innerHTML=`<h1>🔎 Spot the Violation</h1>
   <p class="muted">Look at the field scenario and pick the code violation. Round score: ${viz.score}</p>
   <div class="card">
     <h2>${it.title}</h2>
     <div class="viz-scene">${it.svg}</div>
     <div id="vizOpts" style="margin-top:14px">${opts.map((o,i)=>`<button class="q-opt" onclick="vizAns('${encodeURIComponent(o)}')"><span class="letter">${'ABCD'[i]}</span>${o}</button>`).join('')}</div>
     <div id="vizExp"></div>
   </div>${footerNote()}`;
}
function vizAns(enc){
  if(viz.answered)return;viz.answered=true;
  const o=decodeURIComponent(enc);
  const it=VIOLATIONS[viz.idx];
  const btns=document.querySelectorAll('#vizOpts .q-opt');
  btns.forEach(b=>{const txt=b.textContent.slice(1).trim();
    if(txt===it.correct)b.classList.add('correct');
    if(txt===o&&o!==it.correct)b.classList.add('wrong');});
  const right=o===it.correct;
  if(right){viz.score++;addXP(20,'Good eye!');}
  document.getElementById('vizExp').innerHTML=`
    <div class="explain">${right?'✅ <b>Correct!</b> ':'❌ <b>Look again.</b> '}${it.explain}</div>
    <div class="row" style="margin-top:12px"><button class="btn" onclick="nextViz()">Next Scenario →</button></div>`;
}
function nextViz(){
  viz.count++;
  if(viz.count>=4){S.games.violation++;save();checkBadges();
    const v=document.getElementById('view');
    v.innerHTML=`<div class="card" style="text-align:center"><div style="font-size:50px">🔎</div><h1>Inspection Round Done</h1>
      <p style="font-size:22px">Caught <b>${viz.score}/4</b> violations</p>
      <div class="row" style="justify-content:center;margin-top:14px"><button class="btn" onclick="viz=null;renderViolation()">🔁 New Round</button><button class="btn ghost" onclick="go('games')">Games</button></div></div>`;
    addXP(20,'Inspection round!');viz=null;return;}
  let n;do{n=Math.floor(Math.random()*VIOLATIONS.length);}while(n===viz.idx&&VIOLATIONS.length>1);
  viz.idx=n;viz.answered=false;viz._opts=null;renderViolation();
}
